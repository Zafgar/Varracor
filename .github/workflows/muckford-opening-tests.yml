name: Muckford Tier 0 world, Drowned Chapel and Old Mine

on:
  pull_request:
    paths:
      - "systems/muckford_opening_*.py"
      - "systems/muckford_forest_tutorial.py"
      - "systems/muckford_city_opening.py"
      - "systems/muckford_outskirts_integration.py"
      - "systems/muckford_low_fields_integration.py"
      - "systems/whisper_marsh_story.py"
      - "systems/drowned_chapel_integration.py"
      - "systems/old_muckford_mine_integration.py"
      - "systems/procedural_water.py"
      - "systems/tier0_monster_*.py"
      - "systems/tier0_world_*.py"
      - "lore/tier0_world_plan.py"
      - "tools/tier0_content_report.py"
      - "docs/TIER0_*.md"
      - "ai/tier0_monster_ai.py"
      - "units/tier0_monsters.py"
      - "units/whisper_pool_boss.py"
      - "units/drowned_chapel_monsters.py"
      - "units/old_muckford_mine_monsters.py"
      - "minigames/marsh_fishing.py"
      - "citys/mucford/forest_road_*.py"
      - "citys/mucford/forest_excursion.py"
      - "citys/mucford/low_fields.py"
      - "citys/mucford/drowned_chapel.py"
      - "citys/mucford/mine_road_*.py"
      - "citys/mucford/mine_cave_*.py"
      - "citys/mucford/old_muckford_mine.py"
      - "citys/mucford/muckford_city_menu.py"
      - "npc/marda_shant_npc.py"
      - "npc/dwarf_league_manager.py"
      - "menus/barracks_menu.py"
      - "menus/regional_staging_menu.py"
      - "main.py"
      - "tests/test_muckford_opening.py"
      - "tests/test_muckford_water_outskirts.py"
      - "tests/test_muckford_low_fields.py"
      - "tests/test_whisper_marsh_story_fishing.py"
      - "tests/test_drowned_chapel.py"
      - "tests/test_old_muckford_mine.py"
      - "tests/test_tier0_monsters.py"
      - "tests/test_tier0_world_plan.py"
      - ".github/workflows/muckford-opening-tests.yml"
  push:
    branches:
      - "main"
    paths:
      - "systems/muckford_opening_*.py"
      - "systems/muckford_forest_tutorial.py"
      - "systems/muckford_city_opening.py"
      - "systems/muckford_outskirts_integration.py"
      - "systems/muckford_low_fields_integration.py"
      - "systems/whisper_marsh_story.py"
      - "systems/drowned_chapel_integration.py"
      - "systems/old_muckford_mine_integration.py"
      - "systems/procedural_water.py"
      - "systems/tier0_monster_*.py"
      - "systems/tier0_world_*.py"
      - "lore/tier0_world_plan.py"
      - "tools/tier0_content_report.py"
      - "docs/TIER0_*.md"
      - "ai/tier0_monster_ai.py"
      - "units/tier0_monsters.py"
      - "units/whisper_pool_boss.py"
      - "units/drowned_chapel_monsters.py"
      - "units/old_muckford_mine_monsters.py"
      - "minigames/marsh_fishing.py"
      - "citys/mucford/forest_excursion.py"
      - "citys/mucford/low_fields.py"
      - "citys/mucford/drowned_chapel.py"
      - "citys/mucford/mine_road_*.py"
      - "citys/mucford/mine_cave_*.py"
      - "citys/mucford/old_muckford_mine.py"
      - "menus/barracks_menu.py"
      - "menus/regional_staging_menu.py"
      - "tests/test_muckford_opening.py"
      - "tests/test_muckford_water_outskirts.py"
      - "tests/test_muckford_low_fields.py"
      - "tests/test_whisper_marsh_story_fishing.py"
      - "tests/test_drowned_chapel.py"
      - "tests/test_old_muckford_mine.py"
      - "tests/test_tier0_monsters.py"
      - "tests/test_tier0_world_plan.py"
      - ".github/workflows/muckford-opening-tests.yml"

permissions:
  contents: read
  statuses: write

jobs:
  opening-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Validate Muckford systems and main import
        id: opening_validation
        shell: bash
        run: |
          set +e
          bash -o pipefail -c '
            set -e
            python -m py_compile \
              systems/muckford_opening_core.py \
              systems/muckford_opening_integration.py \
              systems/muckford_forest_tutorial.py \
              systems/muckford_city_opening.py \
              systems/muckford_outskirts_integration.py \
              systems/muckford_low_fields_integration.py \
              systems/whisper_marsh_story.py \
              systems/drowned_chapel_integration.py \
              systems/old_muckford_mine_integration.py \
              systems/procedural_water.py \
              systems/tier0_monster_ecology.py \
              systems/tier0_monster_integration.py \
              systems/tier0_world_tracker.py \
              systems/tier0_world_integration.py \
              lore/tier0_world_plan.py \
              tools/tier0_content_report.py \
              ai/tier0_monster_ai.py \
              units/tier0_monsters.py \
              units/whisper_pool_boss.py \
              units/drowned_chapel_monsters.py \
              units/old_muckford_mine_monsters.py \
              minigames/marsh_fishing.py \
              citys/mucford/forest_road_arena.py \
              citys/mucford/forest_road_menu.py \
              citys/mucford/forest_excursion.py \
              citys/mucford/low_fields.py \
              citys/mucford/drowned_chapel.py \
              citys/mucford/mine_road_arena.py \
              citys/mucford/mine_road_menu.py \
              citys/mucford/mine_cave_arena.py \
              citys/mucford/mine_cave_menu.py \
              citys/mucford/old_muckford_mine.py \
              citys/mucford/muckford_city_menu.py \
              npc/marda_shant_npc.py \
              npc/dwarf_league_manager.py \
              menus/barracks_menu.py \
              menus/regional_staging_menu.py \
              main.py \
              tests/test_muckford_opening.py \
              tests/test_muckford_water_outskirts.py \
              tests/test_muckford_low_fields.py \
              tests/test_whisper_marsh_story_fishing.py \
              tests/test_drowned_chapel.py \
              tests/test_old_muckford_mine.py \
              tests/test_tier0_monsters.py \
              tests/test_tier0_world_plan.py
            python tools/tier0_content_report.py --next 12
            python -c "import main; print(\"main import ok\")"
            python -m pytest -q --tb=short \
              tests/test_muckford_opening.py \
              tests/test_muckford_water_outskirts.py \
              tests/test_muckford_low_fields.py \
              tests/test_whisper_marsh_story_fishing.py \
              tests/test_drowned_chapel.py \
              tests/test_old_muckford_mine.py \
              tests/test_tier0_monsters.py \
              tests/test_tier0_world_plan.py
          ' 2>&1 | tee muckford-opening-test-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Muckford test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: muckford-opening-test-output
          path: muckford-opening-test-output.txt
          retention-days: 7

      - name: Publish Muckford status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_EXIT_CODE: ${{ steps.opening_validation.outputs.exit_code }}
        run: |
          state="success"
          description="Old Muckford Mine and Tier 0 content passed"
          if [ "${TEST_EXIT_CODE}" != "0" ]; then
            state="failure"
            description="Old Muckford Mine or Tier 0 content checks failed"
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"muckford-opening-ci\",\"description\":\"${description}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Fail when Muckford checks failed
        if: steps.opening_validation.outputs.exit_code != '0'
        run: exit 1
