name: Farming expansion checks

on:
  pull_request:
    paths:
      - "citys/mucford/farming_*.py"
      - "items/farm_potions.py"
      - "items/tools/harvest_tools.py"
      - "menus/barracks_menu.py"
      - "skills/commander_skills_data.py"
      - "tests/test_farming_*.py"
      - ".github/workflows/farming-expansion-tests.yml"
  push:
    branches:
      - "main"
      - "agent/farming-expansion"
    paths:
      - "citys/mucford/farming_*.py"
      - "items/farm_potions.py"
      - "items/tools/harvest_tools.py"
      - "menus/barracks_menu.py"
      - "skills/commander_skills_data.py"
      - "tests/test_farming_*.py"
      - ".github/workflows/farming-expansion-tests.yml"

jobs:
  farming-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile farming modules
        run: |
          python -m py_compile \
            citys/mucford/farming_expansion.py \
            citys/mucford/farming_hardening.py \
            citys/mucford/farming_content.py \
            items/farm_potions.py \
            items/tools/harvest_tools.py \
            menus/barracks_menu.py \
            skills/commander_skills_data.py \
            tests/test_farming_expansion.py \
            tests/test_farming_content.py

      - name: Run farming tests
        run: python -m pytest -q tests/test_farming_expansion.py tests/test_farming_content.py
