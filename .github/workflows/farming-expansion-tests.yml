name: Farming expansion checks

on:
  pull_request:
    paths:
      - "citys/mucford/farming_*.py"
      - "items/farm_potions.py"
      - "items/tools/harvest_tools.py"
      - "lore/materials.py"
      - "quests/material_contracts.py"
      - "quests/village_tasks.py"
      - "systems/material_integration.py"
      - "menus/barracks_menu.py"
      - "skills/commander_skills_data.py"
      - "tests/test_farming_*.py"
      - ".github/workflows/farming-expansion-tests.yml"
  push:
    branches:
      - "main"
      - "agent/farming-expansion"
    paths:
      - "citys/mucford/farming_*.py"
      - "items/farm_potions.py"
      - "items/tools/harvest_tools.py"
      - "lore/materials.py"
      - "quests/material_contracts.py"
      - "quests/village_tasks.py"
      - "systems/material_integration.py"
      - "menus/barracks_menu.py"
      - "skills/commander_skills_data.py"
      - "tests/test_farming_*.py"
      - ".github/workflows/farming-expansion-tests.yml"

jobs:
  farming-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile farming and material modules
        run: |
          python -m py_compile \
            citys/mucford/farming_expansion.py \
            citys/mucford/farming_hardening.py \
            citys/mucford/farming_content.py \
            citys/mucford/farming_content_hardening.py \
            citys/mucford/farming_stations.py \
            citys/mucford/farming_stations_hardening.py \
            items/farm_potions.py \
            items/tools/harvest_tools.py \
            lore/materials.py \
            quests/material_contracts.py \
            quests/village_tasks.py \
            systems/material_integration.py \
            menus/barracks_menu.py \
            skills/commander_skills_data.py \
            tests/test_farming_*.py

      - name: Run farming and material tests
        id: farming_pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short tests/test_farming_*.py \
            2>&1 | tee farming-test-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload farming test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: farming-test-output
          path: farming-test-output.txt
          retention-days: 7

      - name: Fail when farming tests failed
        if: steps.farming_pytest.outputs.exit_code != '0'
        run: exit 1
