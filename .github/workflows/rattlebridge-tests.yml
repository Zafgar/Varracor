name: Rattlebridge expansion checks

on:
  pull_request:
    paths:
      - "citys/rattlebridge/**"
      - "systems/rattlebridge_integration.py"
      - "menus/barracks_menu.py"
      - "main.py"
      - "tests/test_rattlebridge_*.py"
      - ".github/workflows/rattlebridge-tests.yml"
  push:
    branches:
      - "main"
    paths:
      - "citys/rattlebridge/**"
      - "systems/rattlebridge_integration.py"
      - "menus/barracks_menu.py"
      - "main.py"
      - "tests/test_rattlebridge_*.py"
      - ".github/workflows/rattlebridge-tests.yml"

permissions:
  contents: read
  statuses: write

jobs:
  rattlebridge-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile Rattlebridge and main state machine
        run: |
          python -m py_compile \
            citys/rattlebridge/__init__.py \
            citys/rattlebridge/rattlebridge_art.py \
            citys/rattlebridge/rattlebridge_art_hardening.py \
            citys/rattlebridge/rattlebridge_data.py \
            citys/rattlebridge/rattlebridge_map.py \
            citys/rattlebridge/rattlebridge_city_menu.py \
            citys/rattlebridge/the_span_menu.py \
            citys/rattlebridge/bridgeward_hospital_menu.py \
            citys/rattlebridge/scrapring_menu.py \
            citys/rattlebridge/rattlebridge_contracts_menu.py \
            citys/rattlebridge/canalworks_menu.py \
            systems/rattlebridge_integration.py \
            menus/barracks_menu.py \
            main.py \
            tests/test_rattlebridge_*.py

      - name: Run Rattlebridge tests
        id: rattlebridge_pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short tests/test_rattlebridge_*.py \
            2>&1 | tee rattlebridge-test-output.txt
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Rattlebridge test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rattlebridge-test-output
          path: rattlebridge-test-output.txt
          retention-days: 7

      - name: Publish Rattlebridge status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_EXIT_CODE: ${{ steps.rattlebridge_pytest.outputs.exit_code }}
        run: |
          state="success"
          description="Rattlebridge map, services and gameplay tests passed"
          if [ "${TEST_EXIT_CODE}" != "0" ]; then
            state="failure"
            description="Rattlebridge expansion tests failed"
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "{\"state\":\"${state}\",\"context\":\"rattlebridge-ci\",\"description\":\"${description}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Fail when Rattlebridge tests failed
        if: steps.rattlebridge_pytest.outputs.exit_code != '0'
        run: exit 1
